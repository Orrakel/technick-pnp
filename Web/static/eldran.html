<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eldran Chat</title>
  <link rel="stylesheet" href="/static/style.css?v=44">
</head>
<body>
  <main class="remote-shell">
    <aside class="remote-sidebar">
      <details class="burger-menu">
        <summary class="burger-button" aria-label="Menue oeffnen"><span class="burger-icon" aria-hidden="true"></span></summary>
        <div class="burger-menu-panel">
          <nav class="top-nav burger-nav">
            <a class="nav-link" data-surface-link="map" href="/Karte">Karte</a>
            <a class="nav-link" data-gm-only data-surface-link="battlemap" href="/Battlemap">Battlemap</a>
            <a class="nav-link" data-nav-link="sheet" href="/Charakterbogen">Charakterbogen</a>
            <a class="nav-link" href="/wiki">Wiki</a>
            <a class="nav-link hidden" data-admin-only href="/notizen">Notizen</a>
            <a class="nav-link hidden" data-admin-only href="/db">Datenbank</a>
          </nav>
          <div class="auth-strip burger-auth">
            <span data-current-user class="file-meta"></span>
            <button data-logout-button class="ghost-button compact-button" type="button">Logout</button>
          </div>
        </div>
      </details>

      <section class="upload-panel remote-temperature-panel">
        <p class="eyebrow">Chats</p>
        <div class="stack-actions">
          <button id="remoteNewChatButton" class="ghost-button compact-button" type="button">Neuer Chat</button>
        </div>
        <div id="remoteChatList" class="chat-list"></div>
      </section>
    </aside>

    <section class="remote-chat-panel">
      <div class="chat-frame remote-frame">
        <div id="remoteMessages" class="messages" aria-live="polite">
          <article class="message assistant">
            <div class="message-role">Eldran</div>
            <div class="message-content">
              Ich bin bereit. Stelle mir deine Frage zu Nova Gaia.
            </div>
          </article>
        </div>
      </div>

      <form id="remoteChatForm" class="composer">
        <label class="sr-only" for="remoteMessageInput">Nachricht</label>
        <textarea
          id="remoteMessageInput"
          name="message"
          rows="1"
          placeholder="Schreibe deine Nachricht..."
          required
        ></textarea>
        <button id="remoteSendButton" type="submit">Senden</button>
      </form>
    </section>
  </main>

  <script src="/static/auth-ui.js?v=25" defer></script>
  <script src="/static/remote.js?v=10" defer></script>
</body>
</html>
