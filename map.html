<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eldran Karte</title>
  <link rel="stylesheet" href="/static/style.css?v=43">
</head>
<body>
  <main id="mapPanelBoard" class="app-shell">
    <aside class="sidebar" data-panel-sidebar="left">
      <details class="burger-menu">
        <summary class="burger-button" aria-label="Menue oeffnen"><span class="burger-icon" aria-hidden="true"></span></summary>
        <div class="burger-menu-panel">
          <nav class="top-nav burger-nav">
            <a class="nav-link" href="/chat">Chat</a>
            <a class="nav-link" href="/db">Datenbank</a>
            <a class="nav-link active" href="/karte">Karte</a>
          </nav>
          <div class="auth-strip burger-auth">
            <span data-current-user class="file-meta"></span>
            <button data-logout-button class="ghost-button compact-button" type="button">Logout</button>
          </div>
        </div>
      </details>
      <div class="panel-column" data-panel-column="left">
        <section class="upload-panel workspace-panel" data-panel-id="maps">
          <div class="panel-header" data-panel-drag>
            <p class="eyebrow">Karten</p>
            <button class="ghost-button compact-button panel-toggle" data-panel-toggle type="button" aria-expanded="true">-</button>
          </div>
          <div data-panel-content>
            <label class="draw-control">
              <span class="file-meta">Neue Karte</span>
              <input id="mapNameInput" class="sidebar-input" type="text" placeholder="Kartenname">
            </label>
            <label class="draw-control">
              <span class="file-meta">Bild</span>
              <input id="mapCreateImageInput" class="sidebar-input" type="file" accept="image/*">
            </label>
            <button id="mapCreateButton" class="ghost-button compact-button" type="button">Karte anlegen</button>
            <label class="draw-control">
              <span class="file-meta">Ausgewaehlte Karte umbenennen</span>
              <input id="mapRenameInput" class="sidebar-input" type="text" placeholder="Neuer Kartenname">
            </label>
            <button id="mapRenameButton" class="ghost-button compact-button" type="button">Umbenennen</button>
            <button id="mapActivateButton" class="ghost-button compact-button" type="button">Fuer Spieler anzeigen</button>
            <button id="mapDeleteButton" class="ghost-button compact-button" type="button">Karte loeschen</button>
            <p id="mapListStatus" class="upload-hint">Aktive Karte wird fuer alle Spieler angezeigt.</p>
            <div id="mapList" class="chat-list"></div>
          </div>
        </section>

        <section class="upload-panel workspace-panel" data-panel-id="image">
          <div class="panel-header" data-panel-drag>
            <p class="eyebrow">Bild</p>
            <button class="ghost-button compact-button panel-toggle" data-panel-toggle type="button" aria-expanded="true">-</button>
          </div>
          <div data-panel-content>
            <label class="upload-button" for="mapImageInput">Aktive Karte aktualisieren</label>
            <input id="mapImageInput" type="file" accept="image/*" hidden>
            <p id="mapUploadStatus" class="upload-hint">PNG, JPG, WEBP oder GIF funktionieren direkt.</p>
            <div class="draw-controls">
              <label class="draw-control">
                <span class="file-meta">Farbe</span>
                <input id="mapDrawColorInput" class="color-input" type="color" value="#ff6b6b">
              </label>
              <label class="draw-control">
                <span class="file-meta">Dicke</span>
                <input id="mapDrawWidthInput" class="range-input" type="range" min="1" max="24" step="1" value="3">
                <span id="mapDrawWidthValue" class="file-meta">3 px</span>
              </label>
            </div>
            <button id="mapDrawingsClearButton" class="ghost-button compact-button" type="button">Alles Gezeichnete loeschen</button>
          </div>
        </section>
      </div>
    </aside>

    <section class="chat-panel map-panel">
      <div class="map-sidebar-toggles">
        <button class="ghost-button compact-button map-sidebar-toggle" data-sidebar-toggle="left" type="button" aria-label="Linke Seitenleiste ein- oder ausklappen"><<</button>
        <button class="ghost-button compact-button map-sidebar-toggle" data-sidebar-toggle="right" type="button" aria-label="Rechte Seitenleiste ein- oder ausklappen">>></button>
      </div>
      <header class="chat-header">
        <div>
          <p class="eyebrow">Live-Bild</p>
          <h2 id="mapTitle">Aktuelle Karte</h2>
        </div>
        <div id="mapStatusBadge" class="status-badge">Bereit</div>
      </header>

      <div class="map-zoom-panel">
        <label class="draw-control">
          <span class="file-meta">Zoom</span>
          <input id="mapZoomInput" class="range-input" type="range" min="50" max="300" step="10" value="100">
          <span id="mapZoomValue" class="file-meta">100 %</span>
        </label>
      </div>

      <section id="mapFrame" class="chat-frame map-frame">
        <div id="mapEmptyState" class="map-empty-state">Noch kein Kartenbild hochgeladen.</div>
        <div id="mapStage" class="map-stage hidden">
          <img id="mapPreviewImage" class="map-image" alt="Aktuelle Eldran-Karte">
          <div id="mapOverlayLayer" class="map-overlay-layer"></div>
          <div id="mapPinLayer" class="map-pin-layer"></div>
          <canvas id="mapDrawingCanvas" class="map-canvas"></canvas>
        </div>
      </section>
      <section id="mapPinDetailCard" class="map-pin-detail hidden">
        <div id="mapPinDetailHeader" class="command-panel-header map-pin-detail-header">
          <p class="eyebrow">Pin</p>
          <div class="map-pin-detail-actions">
            <button id="mapPinSaveButton" class="ghost-button compact-button hidden" type="button">Speichern</button>
            <button id="mapPinDeleteButton" class="ghost-button compact-button hidden" type="button">Loeschen</button>
            <button id="mapPinDetailCloseButton" class="ghost-button compact-button" type="button">Schliessen</button>
          </div>
        </div>
        <label class="draw-control">
          <span class="file-meta">Name</span>
          <input id="mapPinDetailName" class="sidebar-input" type="text" readonly>
        </label>
        <label class="draw-control">
          <span class="file-meta">Beschreibung</span>
          <textarea id="mapPinDetailDescription" class="db-textarea pin-textarea" readonly></textarea>
        </label>
        <label class="draw-control hidden" id="mapPinDetailImageLabel">
          <span class="file-meta">Bild ersetzen</span>
          <input id="mapPinDetailImageInput" class="sidebar-input" type="file" accept="image/*">
        </label>
        <label class="draw-control hidden" id="mapPinDetailShowLabelWrap">
          <span class="file-meta">Name auf Karte anzeigen</span>
          <input id="mapPinDetailShowLabel" type="checkbox">
        </label>
        <img id="mapPinDetailImage" class="map-pin-detail-image hidden" alt="Pin-Bild">
      </section>
    </section>

    <aside class="sidebar sidebar-right" data-panel-sidebar="right">
      <div class="panel-column" data-panel-column="right">
        <section class="upload-panel workspace-panel" data-panel-id="pins">
          <div class="panel-header" data-panel-drag>
            <p class="eyebrow">Pins</p>
            <button class="ghost-button compact-button panel-toggle" data-panel-toggle type="button" aria-expanded="true">-</button>
          </div>
          <div data-panel-content>
            <label class="draw-control">
              <span class="file-meta">Name</span>
              <input id="mapPinNameInput" class="sidebar-input" type="text" placeholder="Pin-Name">
            </label>
            <label class="draw-control">
              <span class="file-meta">Beschreibung</span>
              <textarea id="mapPinDescriptionInput" class="db-textarea pin-textarea" placeholder="Optional"></textarea>
            </label>
            <label class="draw-control">
              <span class="file-meta">Bild</span>
              <input id="mapPinImageInput" class="sidebar-input" type="file" accept="image/*">
            </label>
            <button id="mapPinPlacementButton" class="ghost-button compact-button" type="button">Pin setzen</button>
            <p id="mapPinStatus" class="upload-hint">Pin-Modus aus.</p>
          </div>
        </section>

        <section class="upload-panel command-panel workspace-panel" data-panel-id="commands">
          <div class="panel-header" data-panel-drag>
            <div class="command-panel-header">
              <p class="eyebrow">Chat</p>
              <div class="command-panel-actions">
                <div id="commandChatStatus" class="mini-status">Bereit</div>
                <button id="commandChatClearButton" class="ghost-button compact-button" type="button">Clear</button>
              </div>
            </div>
            <button class="ghost-button compact-button panel-toggle" data-panel-toggle type="button" aria-expanded="true">-</button>
          </div>
          <div data-panel-content class="command-panel-body">
            <div id="commandChatMessages" class="command-messages"></div>
            <form id="commandChatForm" class="command-composer">
              <input id="commandChatInput" class="sidebar-input" type="text" placeholder="Nachricht" autocomplete="off">
              <button class="ghost-button compact-button" type="submit">Senden</button>
            </form>
          </div>
        </section>
      </div>
    </aside>
  </main>

  <script src="/static/auth-ui.js?v=2" defer></script>
  <script src="/static/command-chat.js?v=3" defer></script>
  <script src="/static/panel-layout.js?v=5" defer></script>
  <script src="/static/map-canvas.js?v=24" defer></script>
  <script src="/static/map.js?v=18" defer></script>
</body>
</html>
